name: Synthetic traffic (server + browser)

on:
  schedule:
    - cron: '15 7 * * *'      # daily at 07:15 UTC
    - cron: '0 */3 * * *'     # every 3 hours
  workflow_dispatch:
    inputs:
      run_session_replay:
        description: 'Run session replay demo'
        required: false
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server-side deps
        run: npm i posthog-node @supabase/supabase-js

      - name: Restore persona state
        uses: actions/cache@v4
        with:
          path: .synthetic_state
          key: personas-shared-v1

      # --- ENVIRONMENT VALIDATION ---
      - name: Validate environment variables
        run: |
          echo "🔍 Checking required secrets..."
          if [ -z "$PH_PROJECT_API_KEY" ]; then
            echo "❌ Missing PH_PROJECT_API_KEY"
            exit 1
          fi
          if [ -z "$PH_HOST" ]; then
            echo "❌ Missing PH_HOST"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "❌ Missing SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          echo "✅ All required secrets are configured"
          echo "   PH_HOST: $PH_HOST"
        env:
          PH_PROJECT_API_KEY: ${{ secrets.PH_PROJECT_API_KEY }}
          PH_HOST: ${{ secrets.PH_HOST }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # --- SERVER-SIDE EVENTS (NO PLAYWRIGHT NEEDED) ---
      
      # FlixBuddy Welcome Experiment (server-side only, runs first!)
      - name: Run FlixBuddy experiment funnel
        run: |
          echo "🤖 Starting FlixBuddy welcome experiment funnel..."
          node scripts/synthetic/flixbuddy-experiment-funnel.js 2>&1 | tee flixbuddy_funnel.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          if grep -q "Experiment ended" flixbuddy_funnel.log; then
            echo "⏰ FlixBuddy experiment has ended, skipping traffic generation"
          elif [ $EXIT_CODE -eq 0 ]; then
            echo "✅ FlixBuddy experiment funnel completed"
            # Extract summary
            grep -A 10 "FlixBuddy Experiment Summary" flixbuddy_funnel.log || true
          else
            echo "⚠️  FlixBuddy funnel completed with warnings"
            cat flixbuddy_funnel.log
          fi
        env:
          STATE_DIR: .synthetic_state
          FLIXBUDDY_FUNNEL_COUNT: 50
          DEBUG: false
          POSTHOG_KEY: ${{ secrets.PH_PROJECT_API_KEY }}
          PH_HOST: ${{ secrets.PH_HOST }}
          EXPERIMENT_END_DATE: "2026-09-01T12:00:00Z"
        continue-on-error: false

      # FlixBuddy returning users — replays saved personas with age-based decay
      - name: Run FlixBuddy returning users
        run: |
          echo "🔁 Sending FlixBuddy return events for existing cohort..."
          node scripts/synthetic/flixbuddy-returning-users.js 2>&1 | tee flixbuddy_returning.log
          EXIT_CODE=${PIPESTATUS[0]}
          SENT=$(grep -oP '\d+(?= return events sent)' flixbuddy_returning.log | head -1 || echo "0")
          echo "📊 FlixBuddy returning: $SENT return events sent"
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ FlixBuddy returning users completed"
          else
            echo "⚠️  FlixBuddy returning users completed with warnings"
          fi
        env:
          STATE_DIR: .synthetic_state
          POSTHOG_KEY: ${{ secrets.PH_PROJECT_API_KEY }}
          PH_HOST: ${{ secrets.PH_HOST }}
        continue-on-error: true

      # LLM Analytics baseload (server-side, no browser needed)
      - name: Generate LLM analytics traffic
        run: |
          echo "🤖 Generating synthetic LLM analytics events..."
          node scripts/generate-llm-traffic.js 2>&1 | tee llm_traffic.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ LLM analytics traffic generated"
            grep -E "Generations:|Traces:|Errors:" llm_traffic.log || true
          else
            echo "⚠️  LLM analytics generation failed"
          fi
        env:
          PH_PROJECT_API_KEY: ${{ secrets.PH_PROJECT_API_KEY }}
          PH_HOST: ${{ secrets.PH_HOST }}
          INCREMENTAL: 'true'
        continue-on-error: true

      # --- BROWSER FLOWS (PLAYWRIGHT REQUIRED) ---
      - name: Install Playwright
        run: |
          npm i playwright@1.49.0 playwright-extra puppeteer-extra-plugin-stealth
          npx playwright@1.49.0 install --with-deps chromium
        continue-on-error: true

      # Synthetic traffic - 7 hardcoded returning users (browser sessions)
      - name: Run synthetic traffic (returning browser sessions)
        run: |
          echo "🌐 Starting synthetic browser sessions (7 hardcoded users)..."
          node scripts/synthetic-traffic.js 2>&1 | tee synthetic_traffic.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Synthetic traffic completed"
          else
            echo "⚠️  Synthetic traffic completed with warnings"
            grep -i "error" synthetic_traffic.log | head -10 || true
          fi
        env:
          APP_URL: https://hogflix-project.vercel.app
        continue-on-error: true

      # New user signup journeys (creates real users)
      - name: Run new user signup journeys
        run: |
          echo "🎭 Starting new user signup journeys..."
          node scripts/playwright-journey-new-user.js 2>&1 | tee new_user.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          # Extract success count
          SUCCESS_COUNT=$(grep -oP '\d+(?=/\d+ new user journeys completed successfully)' new_user.log || echo "0")
          TOTAL_COUNT=$(grep -oP '\d+/\K\d+(?= new user journeys completed successfully)' new_user.log || echo "10")
          
          echo "📊 New User Journeys Summary:"
          echo "   - Successful: $SUCCESS_COUNT/$TOTAL_COUNT"
          echo "   - Exit code: $EXIT_CODE"
          
          if [ $SUCCESS_COUNT -eq 0 ]; then
            echo "⚠️  No successful signups"
            grep -i "error\|failed" new_user.log | head -20 || true
          else
            echo "✅ New user journeys completed ($SUCCESS_COUNT successful)"
          fi
        env:
          STATE_DIR: .synthetic_state
          APP_URL: https://hogflix-project.vercel.app
          NEW_USER_COUNT: 10
          DEBUG: false
          POSTHOG_KEY: ${{ secrets.PH_PROJECT_API_KEY }}
        continue-on-error: true
      
      # Returning user engagement sessions
      - name: Run returning user sessions
        run: |
          echo "🔄 Starting returning user sessions..."
          node scripts/playwright-journey-returning-user.js 2>&1 | tee returning_user.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          # Extract success count
          SUCCESS_COUNT=$(grep -oP '\d+(?= successful returning user sessions)' returning_user.log || echo "0")
          
          echo "📊 Returning User Sessions Summary:"
          echo "   - Successful sessions: $SUCCESS_COUNT"
          echo "   - Exit code: $EXIT_CODE"
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Returning user sessions completed"
          else
            echo "⚠️  Returning user sessions completed with warnings"
          fi
        env:
          STATE_DIR: .synthetic_state
          APP_URL: https://hogflix-project.vercel.app
          RETURNING_USER_COUNT: 30
          DEBUG: false
          POSTHOG_KEY: ${{ secrets.PH_PROJECT_API_KEY }}
          SUPABASE_URL: https://ygbftctnpvxhflpamjrt.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        continue-on-error: true

      # Pricing experiment funnel (drives traffic for pricing_page_layout_experiment)
      - name: Run pricing experiment funnel
        run: |
          echo "🎯 Starting pricing experiment funnel journeys..."
          node scripts/synthetic/pricing-experiment-funnel.js 2>&1 | tee pricing_funnel.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          EXPOSURES=$(grep -oP 'Exposures: \K\d+' pricing_funnel.log || echo "0")
          SIGNUPS=$(grep -oP 'Signups: \K\d+' pricing_funnel.log || echo "0")
          
          echo "📊 Pricing Experiment Summary:"
          echo "   - Exposures: $EXPOSURES"
          echo "   - Signups: $SIGNUPS"
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Pricing experiment funnel completed"
          else
            echo "⚠️  Pricing funnel completed with warnings"
          fi
        env:
          STATE_DIR: .synthetic_state
          APP_URL: https://hogflix-project.vercel.app
          PRICING_FUNNEL_COUNT: 20
          DEBUG: false
          POSTHOG_KEY: ${{ secrets.PH_PROJECT_API_KEY }}
        continue-on-error: true

      # Legacy lightweight bot (optional, for quick funnel events)
      - name: Run legacy bot (quick funnel events)
        run: |
          echo "🤖 Running legacy bot..."
          node scripts/playwright-bot.js || echo "⚠️  Legacy bot completed with warnings"
        env:
          STATE_DIR: .synthetic_state
          APP_URL: https://hogflix-project.vercel.app
        continue-on-error: true

      # FlixBuddy real chat sessions (creates session replays with LLM interactions)
      - name: Run FlixBuddy chat sessions
        run: |
          echo "🤖 Starting FlixBuddy chat sessions for session replay..."
          node scripts/playwright-flixbuddy-chat.js 2>&1 | tee flixbuddy_chat.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ FlixBuddy chat sessions completed"
            grep -E "Done!|sessions completed" flixbuddy_chat.log || true
          else
            echo "⚠️  FlixBuddy chat sessions completed with warnings"
          fi
        env:
          APP_URL: https://hogflix-project.vercel.app
          POSTHOG_KEY: ${{ secrets.PH_PROJECT_API_KEY }}
          FLIXBUDDY_SESSION_COUNT: '2'
          DEBUG: 'false'
        continue-on-error: true

      # --- SESSION REPLAY DEMO ---
      - name: Run session replay demo (manual trigger)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_session_replay == 'true'
        run: |
          echo "🎬 Starting session replay demo journey..."
          node scripts/playwright-session-replay-demo.js 2>&1 | tee session_replay.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Session replay demo completed successfully"
            echo "📹 Check PostHog Session Replay for synthetic sessions tagged with 'is_synthetic=true'"
            echo "   Journey: Landing → Register → Watch Movie → Pricing → Checkout → Watch Movie"
          else
            echo "⚠️  Session replay demo failed"
            cat session_replay.log
            exit 1
          fi
        env:
          APP_URL: https://hogflix-project.vercel.app
          DEBUG: true
          POSTHOG_KEY: ${{ secrets.PH_PROJECT_API_KEY }}
        continue-on-error: false

      # --- EVENT VERIFICATION ---
      - name: Verify PostHog events (optional)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/verify-posthog-events.js
        env:
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: 0191db49-6f72-0000-e9a2-66ad8c3dda1a
        continue-on-error: true

      # --- CLEANUP ---
      - name: Clean up old synthetic Supabase accounts
        run: |
          echo "🧹 Cleaning up synthetic accounts older than 14 days..."
          node scripts/cleanup-synthetic-users.js 2>&1 | tee cleanup.log
          EXIT_CODE=${PIPESTATUS[0]}
          DELETED=$(grep -oP '\d+(?= deleted)' cleanup.log | head -1 || echo "0")
          echo "📊 Cleanup: $DELETED accounts removed"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "⚠️  Cleanup completed with warnings"
          else
            echo "✅ Cleanup completed"
          fi
        env:
          SUPABASE_URL: https://ygbftctnpvxhflpamjrt.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SYNTHETIC_USER_RETENTION_DAYS: '14'
        continue-on-error: true

      - name: Save persona state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .synthetic_state
          key: personas-shared-v1
